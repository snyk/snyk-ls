version: 2.1

orbs:
  prodsec: snyk/prodsec-orb@dev:77296498b43f146daab0c41a89d6ddd21ed2e74c

jobs:
  security-scans:
    resource_class: small
    docker:
      - image: cimg/go:1.26.4
    steps:
      - checkout
      - prodsec/security_scans:
          mode: auto
          open-source-additional-arguments: --exclude=testdata
          iac-scan: disabled
          open-source-scan: low

workflows:
  version: 2
  CICD:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: snyk-on-snyk-devex_ide
          filters:
            branches:
              ignore:
                - main

      - security-scans:
          context: devex_ide
