name: Update Compatibility Matrix

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print output without creating PR)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  update-matrix:
    name: Update Compatibility Matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout snyk-ls repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Load SSH signing key into agent
        if: github.event.inputs.dry_run != 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEAM_IDE_USER_SSH }}

      - name: Build compatibility matrix generator
        run: |
          cd scripts/compatibility-matrix
          go build -o ../../build/compatibility-matrix .

      - name: Generate compatibility matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ./build/compatibility-matrix -dry-run
          else
            ./build/compatibility-matrix -output output/compatibility-matrix.md
          fi

      - name: Checkout user-docs repository
        if: github.event.inputs.dry_run != 'true'
        uses: actions/checkout@v4
        with:
          repository: snyk/user-docs
          path: user-docs
          token: ${{ secrets.TEAM_IDE_PAT }}

      - name: Update compatibility matrix in user-docs
        if: github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p user-docs/developer-tools/snyk-ide-plugins-and-extensions
          cp output/compatibility-matrix.md user-docs/developer-tools/snyk-ide-plugins-and-extensions/compatibility-matrix.md

      - name: Create pull request
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.TEAM_IDE_PAT }}
          PUB_SIGNING_KEY: ${{ secrets.TEAM_IDE_USER_SSH_PUB }}
        run: |
          cd user-docs

          # Configure git identity. Must match the account that owns the SSH
          # signing key below so GitHub marks the commit as Verified.
          git config --global user.name "Snyk Team IDE"
          git config --global user.email "team-ide@snyk.io"

          # Configure SSH commit signing (mirrors .github/create-cli-pr.sh).
          # The matching private key is loaded into the ssh-agent earlier.
          git config --global gpg.format ssh
          git config --global commit.gpgsign true
          echo "$PUB_SIGNING_KEY" > signingkey.pub
          git config --global user.signingkey ./signingkey.pub

          # Create a new branch
          BRANCH_NAME="chore/update-ide-compatibility-matrix-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"

          # Commit changes
          git add developer-tools/snyk-ide-plugins-and-extensions/compatibility-matrix.md

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update IDE plugin compatibility matrix

          Automated update of the IDE plugin compatibility matrix showing
          the compatible CLI version range for each IDE plugin version
          released in the past 12 months.

          Generated by: https://github.com/snyk/snyk-ls/blob/main/.github/workflows/update-compatibility-matrix.yaml"

          # Push the branch
          git push -f origin "$BRANCH_NAME"

          # Create or update the PR using gh CLI. The branch name is stable within
          # a UTC day, so a same-day re-run must update the existing PR rather than
          # fail on a duplicate (gh pr create returns 422). Mirrors create-cli-pr.sh.
          PR_TITLE="chore: update IDE plugin compatibility matrix"
          PR_BODY="## Description

          This PR updates the IDE plugin compatibility matrix with the latest release information.

                      The matrix shows the latest compatible CLI version for each IDE plugin version released in the past 12 months.

          ## Changes
          - Updated compatibility matrix with latest IDE plugin releases
          - Matrix includes: VSCode, IntelliJ, Visual Studio, and Eclipse plugins

          ## Notes
          - This is an automated PR generated daily
          - The matrix is generated from GitHub releases of the IDE plugins
          - CLI versions shown are from the stable channel

          ---
          _Generated by [snyk-ls compatibility matrix workflow](https://github.com/snyk/snyk-ls/blob/main/.github/workflows/update-compatibility-matrix.yaml)_"

          # jq '.[0].number' yields the string "null" on an empty result, which
          # would defeat the -z test; '// empty' makes it a true empty string.
          PR=$(gh pr list --repo snyk/user-docs --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty' || true)
          if [[ -z "$PR" ]]; then
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH_NAME" \
              --repo snyk/user-docs
          else
            echo "PR #$PR already exists — updating"
            gh pr edit "$PR" --repo snyk/user-docs --title "$PR_TITLE" --body "$PR_BODY"
          fi

          # enable auto merge
          # gh pr merge -m --auto --delete-branch
