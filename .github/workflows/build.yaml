name: Build
on:
  workflow_dispatch:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Run go generate commands
        run: make generate

      - name: Verify generated files match committed versions
        run: git status --porcelain=v1 | tee /dev/stderr | wc -l | grep -qE '^ *0 *$'

      - name: Lint source code
        run: make lint

  unit-tests:
    name: unit tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Run tests
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          make clean test

  integration-tests:
    name: integration-tests
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup tools (`make tools`)
        if: matrix.os != 'windows-latest'
        uses: ./.github/actions/setup-tools

      - name: Run integration & smoke tests with Pact
        if: matrix.os == 'ubuntu-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
          SMOKE_TESTS: "true"
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          make clean test

      - name: Run integration tests with Pact
        if: matrix.os == 'macos-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
          SMOKE_TESTS: "true"
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

          make clean test

      - name: Run integration tests without Pact
        if: matrix.os == 'windows-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
          SMOKE_TESTS: "true"
        run: |
          make clean test

  windows-test-profile:
    name: windows-test-profile
    needs: [lint]
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
      SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
      SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
      INTEG_TESTS: "true"
      SMOKE_TESTS: "true"
      GO_TEST_TIMEOUT: "120m"
      TOP_N: "50"
      PROFILE_PACKAGE: "./application/server"
      PROFILE_RUN_REGEX: "Test_textDocumentInlineValues_InlineValues_IntegTest"
      PROFILE_COUNT: "5"
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean test artifacts
        shell: pwsh
        run: |
          make clean
          New-Item -ItemType Directory -Force -Path build/windows-profile | Out-Null

      - name: Run JS tests phase
        id: js-tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'

          $profileDir = 'build/windows-profile'
          $logPath = Join-Path $profileDir 'windows-js-test.log'
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()

          make test-js 2>&1 | Tee-Object -FilePath $logPath
          $exitCode = $LASTEXITCODE

          $stopwatch.Stop()

          "duration_seconds=$([math]::Round($stopwatch.Elapsed.TotalSeconds, 2))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run Go tests phase with JSON output
        id: go-tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'

          $profileDir = 'build/windows-profile'
          $goJsonPath = Join-Path $profileDir 'windows-go-test.json'
          $goErrPath = Join-Path $profileDir 'windows-go-test.stderr.log'
          $coveragePath = Join-Path $profileDir 'windows-coverage.out'
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()

          go test -json -timeout "$env:GO_TEST_TIMEOUT" -cover "-coverprofile=$coveragePath" ./... 2> $goErrPath | Tee-Object -FilePath $goJsonPath
          $exitCode = $LASTEXITCODE

          $stopwatch.Stop()

          "duration_seconds=$([math]::Round($stopwatch.Elapsed.TotalSeconds, 2))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build timing and failure reports
        shell: pwsh
        run: |
          $profileDir = 'build/windows-profile'
          $goJsonPath = Join-Path $profileDir 'windows-go-test.json'
          $topPackagesPath = Join-Path $profileDir 'top-packages.txt'
          $topTestsPath = Join-Path $profileDir 'top-tests.txt'
          $failedPackagesPath = Join-Path $profileDir 'failed-packages.txt'
          $failedTestsPath = Join-Path $profileDir 'failed-tests.txt'

          $topN = 50
          if (-not [int]::TryParse($env:TOP_N, [ref]$topN)) {
            $topN = 50
          }
          if ($topN -lt 1) {
            $topN = 50
          }

          $packageRows = New-Object System.Collections.Generic.List[object]
          $testRows = New-Object System.Collections.Generic.List[object]
          $failedPackages = New-Object System.Collections.Generic.HashSet[string]
          $failedTests = New-Object System.Collections.Generic.HashSet[string]

          if (Test-Path $goJsonPath) {
            Get-Content -Path $goJsonPath | ForEach-Object {
              if ([string]::IsNullOrWhiteSpace($_)) {
                return
              }

              try {
                $entry = $_ | ConvertFrom-Json -ErrorAction Stop
              } catch {
                return
              }

              if ($entry.Action -eq 'pass' -and $null -ne $entry.Elapsed) {
                if ($entry.Test) {
                  $testRows.Add([PSCustomObject]@{
                    Package = $entry.Package
                    Test = $entry.Test
                    Seconds = [double]$entry.Elapsed
                  })
                } elseif ($entry.Package) {
                  $packageRows.Add([PSCustomObject]@{
                    Package = $entry.Package
                    Seconds = [double]$entry.Elapsed
                  })
                }
              }

              if ($entry.Action -eq 'fail') {
                if ($entry.Test -and $entry.Package) {
                  $null = $failedTests.Add("$($entry.Package)::$($entry.Test)")
                } elseif ($entry.Package) {
                  $null = $failedPackages.Add([string]$entry.Package)
                }
              }
            }
          }

          if ($packageRows.Count -eq 0) {
            'No package timing data found in go test JSON output.' | Set-Content -Path $topPackagesPath
          } else {
            $packageRows |
              Sort-Object -Property Seconds -Descending |
              Select-Object -First $topN |
              ForEach-Object { '{0,10:N3}s  {1}' -f $_.Seconds, $_.Package } |
              Set-Content -Path $topPackagesPath
          }

          if ($testRows.Count -eq 0) {
            'No test timing data found in go test JSON output.' | Set-Content -Path $topTestsPath
          } else {
            $testRows |
              Sort-Object -Property Seconds -Descending |
              Select-Object -First $topN |
              ForEach-Object { '{0,10:N3}s  {1}::{2}' -f $_.Seconds, $_.Package, $_.Test } |
              Set-Content -Path $topTestsPath
          }

          if ($failedPackages.Count -eq 0) {
            'No failed packages detected in go test JSON output.' | Set-Content -Path $failedPackagesPath
          } else {
            $failedPackages |
              Sort-Object |
              Set-Content -Path $failedPackagesPath
          }

          if ($failedTests.Count -eq 0) {
            'No failed tests detected in go test JSON output.' | Set-Content -Path $failedTestsPath
          } else {
            $failedTests |
              Sort-Object |
              Set-Content -Path $failedTestsPath
          }

      - name: Run targeted CPU and memory profiling
        id: targeted-profiling
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'

          $profileDir = 'build/windows-profile'
          $targetedJsonPath = Join-Path $profileDir 'targeted-repeat.json'
          $targetedErrPath = Join-Path $profileDir 'targeted-repeat.stderr.log'
          $cpuProfilePath = Join-Path $profileDir 'targeted.cpu.pprof'
          $memProfilePath = Join-Path $profileDir 'targeted.mem.pprof'
          $tracePath = Join-Path $profileDir 'targeted.trace'

          $runRegex = $env:PROFILE_RUN_REGEX
          if ([string]::IsNullOrWhiteSpace($runRegex)) {
            $runRegex = '.'
          }

          $count = 1
          if (-not [int]::TryParse($env:PROFILE_COUNT, [ref]$count)) {
            $count = 1
          }
          if ($count -lt 1) {
            $count = 1
          }

          go test -json -timeout "$env:GO_TEST_TIMEOUT" "-run=$runRegex" "-count=$count" "-cpuprofile=$cpuProfilePath" "-memprofile=$memProfilePath" "-trace=$tracePath" $env:PROFILE_PACKAGE 2> $targetedErrPath | Tee-Object -FilePath $targetedJsonPath
          $exitCode = $LASTEXITCODE

          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Write workflow summary
        if: always()
        shell: pwsh
        run: |
          $profileDir = 'build/windows-profile'
          $topPackagesPath = Join-Path $profileDir 'top-packages.txt'
          $topTestsPath = Join-Path $profileDir 'top-tests.txt'
          $failedPackagesPath = Join-Path $profileDir 'failed-packages.txt'
          $failedTestsPath = Join-Path $profileDir 'failed-tests.txt'

          $jsDuration = '${{ steps.js-tests.outputs.duration_seconds }}'
          $goDuration = '${{ steps.go-tests.outputs.duration_seconds }}'
          $jsExitCode = '${{ steps.js-tests.outputs.exit_code }}'
          $goExitCode = '${{ steps.go-tests.outputs.exit_code }}'
          $targetedExitCode = '${{ steps.targeted-profiling.outputs.exit_code }}'

          if ([string]::IsNullOrWhiteSpace($jsDuration)) {
            $jsDuration = 'n/a'
          }
          if ([string]::IsNullOrWhiteSpace($goDuration)) {
            $goDuration = 'n/a'
          }
          if ([string]::IsNullOrWhiteSpace($jsExitCode)) {
            $jsExitCode = 'n/a'
          }
          if ([string]::IsNullOrWhiteSpace($goExitCode)) {
            $goExitCode = 'n/a'
          }
          if ([string]::IsNullOrWhiteSpace($targetedExitCode)) {
            $targetedExitCode = 'n/a'
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows test profiling summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- JS test phase: ${jsDuration}s (exit code: ${jsExitCode})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Go test phase: ${goDuration}s (exit code: ${goExitCode})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Targeted CPU/memory profile: exit code ${targetedExitCode} (${env:PROFILE_PACKAGE}, run=${env:PROFILE_RUN_REGEX}, count=${env:PROFILE_COUNT})"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Slowest packages'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path $topPackagesPath) {
            Get-Content -Path $topPackagesPath -TotalCount 20 | ForEach-Object {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
            }
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No package report generated.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Slowest tests'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path $topTestsPath) {
            Get-Content -Path $topTestsPath -TotalCount 20 | ForEach-Object {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
            }
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No test report generated.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Failed tests'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path $failedTestsPath) {
            Get-Content -Path $failedTestsPath -TotalCount 20 | ForEach-Object {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
            }
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No failed test report generated.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Failed packages'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
          if (Test-Path $failedPackagesPath) {
            Get-Content -Path $failedPackagesPath -TotalCount 20 | ForEach-Object {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_
            }
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No failed package report generated.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'

      - name: Upload profiling artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-profile-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/windows-profile/windows-js-test.log
            build/windows-profile/windows-go-test.json
            build/windows-profile/windows-go-test.stderr.log
            build/windows-profile/windows-coverage.out
            build/windows-profile/top-packages.txt
            build/windows-profile/top-tests.txt
            build/windows-profile/failed-packages.txt
            build/windows-profile/failed-tests.txt
            build/windows-profile/targeted-repeat.json
            build/windows-profile/targeted-repeat.stderr.log
            build/windows-profile/targeted.cpu.pprof
            build/windows-profile/targeted.mem.pprof
            build/windows-profile/targeted.trace

      - name: Fail job when test phase failed
        if: always()
        shell: pwsh
        run: |
          $jsExitCode = 1
          $goExitCode = 1
          $targetedExitCode = 1

          if (-not [int]::TryParse('${{ steps.js-tests.outputs.exit_code }}', [ref]$jsExitCode)) {
            $jsExitCode = 1
          }
          if (-not [int]::TryParse('${{ steps.go-tests.outputs.exit_code }}', [ref]$goExitCode)) {
            $goExitCode = 1
          }
          if (-not [int]::TryParse('${{ steps.targeted-profiling.outputs.exit_code }}', [ref]$targetedExitCode)) {
            $targetedExitCode = 1
          }

          if ($jsExitCode -ne 0 -or $goExitCode -ne 0 -or $targetedExitCode -ne 0) {
            Write-Error "Failing workflow: JS exit code=$jsExitCode, Go exit code=$goExitCode, Targeted profile exit code=$targetedExitCode"
            exit 1
          }


  proxy-test:
    name: proxy-test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run proxy tests
        env:
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
        run: |
          make clean proxy-test

  race-tests:
    name: race-test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Run race tests
        env:
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          make clean race-test

  update-licenses:
    name: update licenses
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.TEAM_IDE_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: update licenses
        run: |
          make license-update

      - name: commit license changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actor
          committer_name: Github Actions
          committer_email: noreply@snyk.io
          message: "docs: updated licenses"
          add: "licenses"
          push: true
  test-release:
    name: test-release
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # does an unshallow checkout with tags & branches

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Create License Report
        id: create_license_report
        run: |
          LICENSES=$(make licenses)
          echo 'LICENSES<<EOF' >> $GITHUB_OUTPUT
          echo $LICENSES >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo $LICENSES

      - name: Do test release with goreleaser
        uses: goreleaser/goreleaser-action@v6
        env:
          LICENSES: ${{ steps.create_license_report.outputs.LICENSES }}
        with:
          version: "v2.4.7"
          args: release --clean --snapshot

      - name: Output compiled licenses
        run: |
          chmod +x build/snyk-ls_linux_amd64_v1/snyk-ls
          build/snyk-ls_linux_amd64_v1/snyk-ls -licenses

      - name: Dry-run upload script
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          .github/upload-to-s3.sh --dryrun
