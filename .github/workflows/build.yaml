name: Build
on:
  workflow_dispatch:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Verify go generate artifacts match committed versions
        run: make verify-generate

      - name: Lint source code
        run: make lint

  integration-tests:
    name: integration-tests
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup tools (`make tools`)
        if: matrix.os != 'windows-latest'
        uses: ./.github/actions/setup-tools

      - name: Run integration tests with Pact
        if: matrix.os == 'ubuntu-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          make clean test

      - name: Run integration tests with Pact
        if: matrix.os == 'macos-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &

          make clean test

      - name: Run integration tests without Pact
        if: matrix.os == 'windows-latest'
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
        run: |
          make clean test

  # Smoke tests run in parallel across 4 shards on ubuntu-latest. Each shard targets a
  # subset of tests balanced by estimated wall time (see IDE-2006 implementation plan).
  # Sharding keys: smoke-fixtures-goof-<sharedGoofCommit>-snykcon-<sharedSnykconGoofCommit>-fakeleaks-<sharedFakeLeaksCommit>
  # Update the cache key below when bumping any of the three pinned commits in smoke_main_test.go.
  smoke-tests:
    name: smoke (${{ matrix.shard }})
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: workspace
            run: 'Test_SmokeWorkspaceScan|Test_SmokeIssueCaching|Test_SmokeScanUnmanaged|Test_SmokeLegacyRoutingUnmanagedWithRiskScore'
          - shard: code
            run: 'Test_SmokeSnykCode|Test_SmokePreScanCommand|Test_SmokeExecuteCLICommand|Test_SmokeInstanceTest|Test_SmokeUncFilePath'
          - shard: precedence-org
            run: 'Test_SmokePrecedence|Test_SmokeScanPrecedence|Test_SmokeOrgSelection'
          - shard: infra
            run: 'Test_SmokeLdxSync|Test_SmokeSecrets|Test_Invalid|TestUnifiedTestApiSmokeTest|Test_SmokeConfig|Test_SmokeTreeView'
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      # Export absolute cache paths via GITHUB_ENV so Go's os.MkdirAll/os.Stat receive
      # the same expanded paths that actions/cache uses. Tilde is NOT expanded in env: blocks.
      - name: Set cache dir paths
        run: |
          echo "SNYK_LS_CLI_CACHE_DIR=$HOME/.cache/snyk-ls/cli" >> "$GITHUB_ENV"
          echo "SNYK_LS_FIXTURE_CACHE_DIR=$HOME/.cache/snyk-ls/fixtures" >> "$GITHUB_ENV"

      - name: Cache Snyk CLI
        uses: actions/cache@v4
        with:
          path: ${{ env.SNYK_LS_CLI_CACHE_DIR }}
          key: snyk-cli-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infrastructure/cli/install/*.go') }}

      - name: Cache smoke fixtures
        uses: actions/cache@v4
        with:
          path: ${{ env.SNYK_LS_FIXTURE_CACHE_DIR }}
          # Update this key when bumping sharedGoofCommit, sharedSnykconGoofCommit, or sharedFakeLeaksCommit in smoke_main_test.go.
          key: smoke-fixtures-goof-0336589-snykcon-eba8407-fakeleaks-f15521a

      - name: Run smoke shard (${{ matrix.shard }})
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          SMOKE_TESTS: "true"
          # SNYK_LS_CLI_CACHE_DIR and SNYK_LS_FIXTURE_CACHE_DIR are set by the
          # "Set cache dir paths" step above via GITHUB_ENV.

          # this is required to be able to test the clipboard
          DISPLAY: ':99'
        run: |
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          go test -timeout=30m -count=1 -run '${{ matrix.run }}' ./application/server/...

  proxy-test:
    name: proxy-test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run proxy tests
        env:
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
        run: |
          make clean proxy-test

  race-tests:
    name: race-test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Run integration race tests (no smoke)
        env:
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          INTEG_TESTS: "true"
        run: |
          export PATH=$PWD/.bin/pact/bin:$PATH

          # this is required to be able to test the clipboard
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          go test -timeout=30m -race -failfast ./...

  # Smoke tests run under the race detector, sharded across 4 runners.
  # Smoke tests are excluded from the serial race-tests job above to avoid serial 22-25 min runs.
  smoke-race-tests:
    name: smoke-race (${{ matrix.shard }})
    needs: []
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: workspace
            run: 'Test_SmokeWorkspaceScan|Test_SmokeIssueCaching|Test_SmokeScanUnmanaged|Test_SmokeLegacyRoutingUnmanagedWithRiskScore'
          - shard: code
            run: 'Test_SmokeSnykCode|Test_SmokePreScanCommand|Test_SmokeExecuteCLICommand|Test_SmokeInstanceTest|Test_SmokeUncFilePath'
          - shard: precedence-org
            run: 'Test_SmokePrecedence|Test_SmokeScanPrecedence|Test_SmokeOrgSelection'
          - shard: infra
            run: 'Test_SmokeLdxSync|Test_SmokeSecrets|Test_Invalid|TestUnifiedTestApiSmokeTest|Test_SmokeConfig|Test_SmokeTreeView'
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Set cache dir paths
        run: |
          echo "SNYK_LS_CLI_CACHE_DIR=$HOME/.cache/snyk-ls/cli" >> "$GITHUB_ENV"
          echo "SNYK_LS_FIXTURE_CACHE_DIR=$HOME/.cache/snyk-ls/fixtures" >> "$GITHUB_ENV"

      - name: Cache Snyk CLI
        uses: actions/cache@v4
        with:
          path: ${{ env.SNYK_LS_CLI_CACHE_DIR }}
          key: snyk-cli-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('infrastructure/cli/install/*.go') }}

      - name: Cache smoke fixtures
        uses: actions/cache@v4
        with:
          path: ${{ env.SNYK_LS_FIXTURE_CACHE_DIR }}
          key: smoke-fixtures-goof-0336589-snykcon-eba8407-fakeleaks-f15521a

      - name: Run smoke-race shard (${{ matrix.shard }})
        env:
          DEEPROXY_API_URL: ${{secrets.DEEPROXY_API_URL}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN }}
          SNYK_TOKEN_CONSISTENT_IGNORES: ${{secrets.SNYK_TOKEN_CONSISTENT_IGNORES}}
          SMOKE_TESTS: "true"
          DISPLAY: ':99'
        run: |
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          sudo apt-get install -y xsel xclip wl-clipboard

          go test -timeout=30m -count=1 -race -failfast -run '${{ matrix.run }}' ./application/server/...

  update-licenses:
    name: update licenses
    needs: [ lint ]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare git
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.TEAM_IDE_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: update licenses
        run: |
          make license-update

      - name: commit license changes
        uses: EndBug/add-and-commit@v10
        with:
          default_author: github_actor
          committer_name: Github Actions
          committer_email: noreply@snyk.io
          message: "docs: updated licenses"
          add: "licenses"
          push: true
  test-release:
    name: test-release
    needs: [ lint ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # does an unshallow checkout with tags & branches

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup tools (`make tools`)
        uses: ./.github/actions/setup-tools

      - name: Create License Report
        id: create_license_report
        run: |
          LICENSES=$(make licenses)
          echo 'LICENSES<<EOF' >> $GITHUB_OUTPUT
          echo $LICENSES >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          echo $LICENSES

      - name: Do test release with goreleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          LICENSES: ${{ steps.create_license_report.outputs.LICENSES }}
        with:
          version: "v2.4.7"
          args: release --clean --snapshot

      - name: Output compiled licenses
        run: |
          chmod +x build/snyk-ls_linux_amd64_v1/snyk-ls
          build/snyk-ls_linux_amd64_v1/snyk-ls -licenses

      - name: Dry-run upload script
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          .github/upload-to-s3.sh --dryrun
